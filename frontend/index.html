<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockFlow MVP</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="background"></div>
  <main class="container">
    <header class="topbar">
      <h1>StockFlow MVP</h1>
      <div id="userBadge" class="user-badge hidden"></div>
      <button id="logoutBtn" class="btn btn-secondary hidden">Logout</button>
    </header>

    <section id="authSection" class="card">
      <div class="tabs">
        <button id="showLoginBtn" class="tab active">Login</button>
        <button id="showSignupBtn" class="tab">Signup</button>
      </div>

      <form id="loginForm" class="form">
        <h2>Login</h2>
        <label>Email</label>
        <input type="email" id="loginEmail" required />
        <label>Password</label>
        <input type="password" id="loginPassword" required />
        <button type="submit" class="btn">Login</button>
      </form>

      <form id="signupForm" class="form hidden">
        <h2>Create account</h2>
        <label>Organization Name</label>
        <input type="text" id="signupOrg" required />
        <label>Email</label>
        <input type="email" id="signupEmail" required />
        <label>Password</label>
        <input type="password" id="signupPassword" minlength="6" required />
        <button type="submit" class="btn">Signup</button>
      </form>
    </section>

    <section id="appSection" class="hidden">
      <nav class="subnav">
        <button class="subtab active" data-view="dashboardView">Dashboard</button>
        <button class="subtab" data-view="productsView">Products</button>
        <button class="subtab" data-view="settingsView">Settings</button>
      </nav>

      <section id="dashboardView" class="view">
        <div class="grid-3">
          <article class="card stat">
            <h3>Total Products</h3>
            <p id="totalProducts">0</p>
          </article>
          <article class="card stat">
            <h3>Total Quantity</h3>
            <p id="totalQuantity">0</p>
          </article>
          <article class="card stat">
            <h3>Low Stock Count</h3>
            <p id="lowStockCount">0</p>
          </article>
        </div>

        <article class="card">
          <h3>Low Stock Items</h3>
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>SKU</th>
                <th>Quantity</th>
                <th>Threshold</th>
              </tr>
            </thead>
            <tbody id="lowStockTable"></tbody>
          </table>
        </article>
      </section>

      <section id="productsView" class="view hidden">
        <article class="card">
          <div class="toolbar">
            <input type="text" id="searchInput" placeholder="Search by name or SKU" />
            <button id="newProductBtn" class="btn">Add Product</button>
          </div>
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>SKU</th>
                <th>Quantity</th>
                <th>Low Stock</th>
                <th>Selling Price</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="productTable"></tbody>
          </table>
        </article>

        <article class="card hidden" id="productFormCard">
          <h3 id="productFormTitle">Add Product</h3>
          <form id="productForm" class="form two-col">
            <input type="hidden" id="productId" />
            <label>Name</label>
            <input type="text" id="productName" required />
            <label>SKU</label>
            <input type="text" id="productSku" required />
            <label>Description</label>
            <textarea id="productDescription"></textarea>
            <label>Quantity</label>
            <input type="number" id="productQuantity" value="0" required />
            <label>Cost Price</label>
            <input type="number" step="0.01" id="productCostPrice" />
            <label>Selling Price</label>
            <input type="number" step="0.01" id="productSellingPrice" />
            <label>Low Stock Threshold</label>
            <input type="number" id="productThreshold" />
            <div class="form-actions">
              <button type="submit" class="btn">Save Product</button>
              <button type="button" id="cancelProductBtn" class="btn btn-secondary">Cancel</button>
            </div>
          </form>
        </article>
      </section>

      <section id="settingsView" class="view hidden">
        <article class="card">
          <h3>Settings</h3>
          <form id="settingsForm" class="form">
            <label>Default Low Stock Threshold</label>
            <input type="number" id="defaultThreshold" min="0" required />
            <button type="submit" class="btn">Save Settings</button>
          </form>
        </article>
      </section>
    </section>

    <p id="message" class="message"></p>
  </main>

  <script src="app.js"></script>
</body>
</html>
